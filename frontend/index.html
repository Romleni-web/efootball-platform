<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="eFootball Tournament Platform - Compete, Win, Earn. Join the ultimate eFootball tournament platform in Kenya.">
    <meta name="theme-color" content="#2563eb">
    <title>eFootball Arena | Tournament Platform</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#mainContent" class="skip-link">Skip to main content</a>
    
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
            <a href="#" class="nav-brand" onclick="Router.navigate('home'); return false;">
                <span class="logo">EA</span>
                <span class="brand-text">eFootball Arena</span>
            </a>
            
            <div class="nav-links" id="navLinks">
                <a href="#" data-page="home" class="active" onclick="Router.navigate('home'); return false;">Home</a>
                <a href="#" data-page="tournaments" onclick="Router.navigate('tournaments'); return false;">Tournaments</a>
                <a href="#" data-page="leaderboard" onclick="Router.navigate('leaderboard'); return false;">Leaderboard</a>
                <span id="authLinks"></span>
            </div>
            
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle mobile menu">Menu</button>
        </nav>

        <!-- Main Content Container -->
        <main id="mainContent" role="main"></main>

        <!-- Footer -->
        <footer class="footer" role="contentinfo">
            <p>&copy; 2026 eFootball Arena. All rights reserved.</p>
        </footer>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Theme Toggle Logic
        (function() {
            const currentTheme = localStorage.getItem('theme') || 'light';
            
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            
            const toggleBtn = document.getElementById('themeToggle');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function() {
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    if (isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                    }
                });
            }
            
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (!localStorage.getItem('theme')) {
                    if (e.matches) {
                        document.documentElement.setAttribute('data-theme', 'dark');
                    } else {
                        document.documentElement.removeAttribute('data-theme');
                    }
                }
            });
        })();
    </script>
</body>
</html>
